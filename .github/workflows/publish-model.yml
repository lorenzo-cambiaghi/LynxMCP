name: Publish model archive

# Hosts the embedding model on a GitHub Release so users who can't reach
# huggingface.co can fetch it with `lynx manager install --from-archive <url>`.
#
# Runs on GitHub's runners (which CAN reach huggingface.co), so the maintainer
# never has to download the ~130MB model locally or install anything: the job
# downloads the model into the HF cache, zips it in the HF hub layout via
# `lynx manager install --export-archive`, and attaches it to a Release.
#
# IDEMPOTENT: the asset name encodes the model (`BAAI--bge-small-en-v1.5.zip`),
# so a model that's already published is SKIPPED — no redundant ~130MB
# re-upload. A *different* model (new repo id) gets a new asset name and is
# published. That's why running this on every release is cheap: it only does
# work the first time a given model appears.
#
# IMPORTANT: the asset's download URL is only publicly reachable (no auth) when
# the repo is PUBLIC. On a private repo the URL needs a token, so plain
# `--from-archive <url>` won't work for end users.
#
# Triggers:
#   - automatically when a version tag (`v*`) is pushed. NOTE: we trigger on the
#     tag push, NOT on `release: published`, on purpose. The `release.yml`
#     workflow creates the GitHub Release with the default GITHUB_TOKEN, and
#     GitHub does NOT fire `on: release` workflows for events produced by that
#     token (recursion prevention) — so a `release` trigger here never runs. A
#     human-pushed tag has no such limitation. It still publishes to the fixed
#     `models` tag (not the version tag), so the download URL stays stable.
#   - manually (Actions tab → "Run workflow") to publish a specific model/tag
#     or to also publish the reranker.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      model:
        description: "HuggingFace model repo id to publish"
        default: "BAAI/bge-small-en-v1.5"
        required: true
      tag:
        description: "Release tag to attach the asset to (created if missing)"
        default: "models"
        required: true
      with_reranker:
        description: "Also download+publish the reranker model"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Lynx
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download + export only the models not already published
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fall back to defaults on the `release` trigger, where `inputs.*`
          # don't exist (the fixed `models` tag keeps the download URL stable).
          model='${{ inputs.model || 'BAAI/bge-small-en-v1.5' }}'
          tag='${{ inputs.tag || 'models' }}'
          with_reranker='${{ inputs.with_reranker || false }}'

          models=("$model")
          if [ "$with_reranker" = "true" ]; then
            models+=("cross-encoder/ms-marco-MiniLM-L-6-v2")
          fi

          # Asset names already on the release ("" if the tag doesn't exist yet).
          existing="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" \
            --json assets -q '.assets[].name' 2>/dev/null || true)"

          published_any=false
          for m in "${models[@]}"; do
            safe="${m//\//--}"            # BAAI/bge-… -> BAAI--bge-…
            asset="${safe}.zip"
            if printf '%s\n' "$existing" | grep -qx "$asset"; then
              echo "::notice::$asset already on '$tag' — model unchanged, skipping."
              continue
            fi
            echo "Downloading + exporting $m ..."
            lynx manager install --model "$m"
            lynx manager install --export-archive "$asset" --model-name "$m"
            published_any=true
          done

          # Primary (embedding) asset name + URL for the release notes / summary.
          primary_safe="${model//\//--}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset=${primary_safe}.zip" >> "$GITHUB_OUTPUT"
          echo "published_any=$published_any" >> "$GITHUB_OUTPUT"

      - name: Publish to Release
        if: steps.plan.outputs.published_any == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.plan.outputs.tag }}
          name: Model archives
          body: |
            Prebuilt HuggingFace model archives for offline installs.

            On a machine that can't reach huggingface.co:
            ```
            lynx manager install --from-archive \
              "https://github.com/${{ github.repository }}/releases/download/${{ steps.plan.outputs.tag }}/${{ steps.plan.outputs.asset }}"
            ```
          files: "*.zip"
          fail_on_unmatched_files: true

      - name: Summary
        run: |
          url="https://github.com/${{ github.repository }}/releases/download/${{ steps.plan.outputs.tag }}/${{ steps.plan.outputs.asset }}"
          if [ "${{ steps.plan.outputs.published_any }}" = "true" ]; then
            {
              echo "### Model published"
              echo ""
              echo "End users (no huggingface.co access) can now run:"
              echo ""
              echo '```'
              echo "lynx manager install --from-archive \"$url\""
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Nothing to publish"
              echo ""
              echo "The requested model(s) are already attached to the \`${{ steps.plan.outputs.tag }}\` release — no redundant upload."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
