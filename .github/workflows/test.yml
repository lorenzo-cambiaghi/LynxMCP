name: Tests

# Runs the pytest suite on every push / PR. The suite is self-contained
# (synthetic codebases, stubbed embedding model) — it does NOT download
# HuggingFace models or need a pre-built index.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests -q

      - name: CLI smoke test
        run: |
          lynx --version
          lynx --help
