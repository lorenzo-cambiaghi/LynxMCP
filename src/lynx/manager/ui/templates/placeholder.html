{% extends "base.html" %}
{% block title %}{{ title }} — LynxManager{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-slate-900 mb-4">{{ title }}</h1>
  <div class="p-6 bg-white border border-dashed border-slate-300 rounded">
    <div class="text-sm text-slate-500">
      🚧 This page lands in {{ phase }}.
    </div>
    <div class="mt-3 text-sm">
      For now, use the CLI: <code class="bg-slate-100 px-1 rounded">{{ cli_hint }}</code>
    </div>
  </div>
</div>
{% endblock %}
