# Lynx PR impact analysis — example workflow.
#
# Copy this into `.github/workflows/` in YOUR repository. On every pull request
# it indexes the repo with Lynx (the model + index are cached between runs),
# then posts a sticky comment with: the cross-file callers of the symbols the PR
# changes (blast radius) and the code semantically related to the change.
#
# 100% local to the runner — your code never leaves GitHub's CI. For big
# monorepos where indexing in CI is too heavy, point the script at a self-hosted
# Lynx instead (see integrations/github-action/README.md).

name: Lynx impact analysis

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write   # to post the comment

jobs:
  impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need base..head for the diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Lynx
        run: pip install lynx-mcp

      # Embedding model (~hundreds of MB) + the index. The first run is slow;
      # later runs restore this and Lynx only re-embeds changed files.
      - name: Cache model + index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            rag_storage
          key: lynx-index-${{ github.sha }}
          restore-keys: lynx-index-

      - name: Configure the repo as a graph-enabled source
        run: |
          cat > config.json <<'JSON'
          {
            "storage_path": "./rag_storage",
            "sources": [
              {
                "name": "repo",
                "type": "codebase",
                "path": ".",
                "supported_extensions": [".py",".ts",".tsx",".js",".jsx",".go",".rs",".java",".rb",".php",".kt",".swift",".cs",".cpp",".c",".h",".scala",".lua",".sh",".sql",".m",".mm"],
                "graph": { "enabled": true }
              }
            ]
          }
          JSON

      - name: Build / update the index
        run: lynx build --source repo

      - name: Start the Lynx API
        run: |
          lynx manager ui --port 8765 --no-browser &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8765/api/v1/sources >/dev/null && break
            sleep 1
          done

      - name: Generate the impact report
        env:
          LYNX_API: http://127.0.0.1:8765
          LYNX_SOURCE: repo
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          curl -sSL -o pr_impact.py \
            https://raw.githubusercontent.com/lorenzo-cambiaghi/LynxMCP/main/integrations/github-action/pr_impact.py
          python pr_impact.py --out comment.md

      - name: Post the sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            const marker = '<!-- lynx-impact-analysis -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const args = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...args, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...args, issue_number: context.issue.number });
            }
